<!DOCTYPE html>
<html lang="zh-CN">

    <meta charset="UTF-8">

    <title>韩语学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root{
            --bg-main: #f8f5fc;
            --text-dark: #221828;
            --text-light: #665872;
            --primary-purple: #a888c8;
            --glass-bg: rgba(255,255,255,0.65);
            --glass-border: rgba(255,255,0.9);
            --shadow-soft: 0 4px 20px rgba(160, 130, 190, 0.12);
            --tag1: #e9e2f5;
            --tag2: #f9e7ec;
            --tag3: #e7f2ee;
            --tag4: #e8f4f6;
        }
        body{
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 85% 30%, rgba(180,140,220,0.15) 0%, transparent 55%);
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .font-serif-big{
            font-family: 'Playfair Display', serif;
        }
        .glass-card{
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            border-radius: 18px;
        }
        .btn-dark{
            background-color: var(--text-dark);
            color: white;
            transition: 0.25s ease;
        }
        .btn-dark:hover{
            opacity: 0.85;
        }
        .btn-light{
            background: rgba(255,255,0.7);
            border: 1px solid rgba(180,140,220,0.25);
            color: var(--text-dark);
        }
        .tab-content{display:none;}
        .tab-content.active{display:block;}
        .bottom-tag{
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 13px;
        }
    </style>
</head>
<body class="pb-24 px-4 md:px-8 lg:px-16">

                    <div class="flex gap-4 text-sm mb-6 flex-wrap text-[#554466]">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="voiceMode" value="kor" checked class="accent-[#a888c8]"> 只播报韩语（页面显示韩文）
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="voiceMode" value="cn" class="accent-[#a888c8]"> 只播报中文（页面显示释义）
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="voiceMode" value="all" class="accent-[#a888c8]"> 中韩双语播报（页面显示释义）
                        </label>
                    </div>

let collectList = JSON.parse(localStorage.getItem('krCollect')) || [];
let errorList = JSON.parse(localStorage.getItem('krError')) || [];
let currentDictWord = null;

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(item => item.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    window.scrollTo(0,0);
}

function speakKorean(text) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "ko-KR";
    speechSynthesis.speak(utter);
}
function speakChinese(text) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "zh-CN";
    speechSynthesis.speak(utter);
}

// 渲染单词列表
function renderWordList() {
    const keyword = document.getElementById('searchInput').value.trim();
    let filterList = wordData.filter(item => item.kr.includes(keyword) || item.cn.includes(keyword));
    let htmlStr = "";
    filterList.forEach(word => {
        const isCollected = collectList.some(c => c.kr === word.kr);
        htmlStr += `
        <div class="flex justify-between items-center py-3 px-3 rounded-xl bg-white/40 hover:bg-white/60 transition">
            <div>
                <p class="font-medium text-[#7859a0] text-lg">${word.kr}</p>
                <p class="text-sm text-[#665872]">${word.cn}</p>
            </div>
            <div class="flex gap-3">
                <button onclick="speakKorean('${word.kr}')" class="text-[#a888c8] text-sm hover:underline">朗读</button>
                <button onclick="toggleCollect('${word.kr}','${word.cn}')" class="text-sm ${isCollected ? 'text-rose-400' : 'text-gray-400'}">
                    ${isCollected ? '已收藏' : '收藏'}
                </button>
            </div>
        </div>
        `
    })
    document.getElementById('wordBox').innerHTML = htmlStr;
}

function toggleCollect(kr, cn) {
    const idx = collectList.findIndex(item => item.kr === kr);
    idx > -1 ? collectList.splice(idx,1) : collectList.push({kr,cn});
    localStorage.setItem('krCollect', JSON.stringify(collectList));
    renderWordList();
    renderCollectPage();
}

function renderCollectPage() {
    let htmlStr = collectList.length === 0 ? '<p class="text-center py-10 text-[#887699]">暂无收藏单词，去单词库添加吧</p>' : "";
    collectList.forEach(word => {
        htmlStr += `
        <div class="flex justify-between items-center py-3 px-3 rounded-xl bg-white/40">
            <div>
                <p class="font-medium text-[#7859a0]">${word.kr}</p>
                <p class="text-sm text-[#665872]">${word.cn}</p>
            </div>
            <div class="flex gap-3">
                <button onclick="speakKorean('${word.kr}')" class="text-[#a888c8] text-sm">朗读</button>
                <button onclick="toggleCollect('${word.kr}','${word.cn}')" class="text-rose-400 text-sm">取消收藏</button>
            </div>
        </div>
        `
    })
    document.getElementById('collectBox').innerHTML = htmlStr;
}

function renderErrorPage() {
    let htmlStr = errorList.length === 0 ? '<p class="text-center py-10 text-[#887699]">暂无错题，开始听写练习吧</p>' : "";
    errorList.forEach((word, index) => {
        htmlStr += `
        <div class="flex justify-between items-center py-3 px-3 rounded-xl bg-white/40">
            <div>
                <p class="font-medium text-[#7859a0]">${word.kr}</p>
                <p class="text-sm text-[#665872]">${word.cn}</p>
            </div>
            <div class="flex gap-3">
                <button onclick="speakKorean('${word.kr}')" class="text-[#a888c8] text-sm">朗读</button>
                <button onclick="deleteError(${index})" class="text-rose-400 text-sm">移除</button>
            </div>
        </div>
        `
    })
    document.getElementById('errorBox').innerHTML = htmlStr;
}

function deleteError(index) {
    errorList.splice(index,1);
    localStorage.setItem('krError', JSON.stringify(errorList));
    renderErrorPage();
}

// 随机出题
function getRandomWord() {
    const randomIndex = Math.floor(Math.random() * wordData.length);
    currentDictWord = wordData[randomIndex];
    document.getElementById('userInput').value = "";
    document.getElementById('answerTip').innerText = "";
    replayVoice();
}

// 核心更新：区分模式显示内容
function replayVoice() {
    if (!currentDictWord) return alert("请先点击下一题获取单词");
    const mode = document.querySelector('input[name="voiceMode"]:checked').value;
    const tipDom = document.getElementById('answerTip');
    if(mode === "kor"){
        speakKorean(currentDictWord.kr);
        tipDom.innerText = ""; // 只报韩语：隐藏答案，空白
    }else if(mode === "cn"){
        speakChinese(currentDictWord.cn);
        tipDom.innerText = ""; // 只报中文：隐藏答案
    }else{
        speakKorean(currentDictWord.kr);
        setTimeout(()=>speakChinese(currentDictWord.cn), 800);
        tipDom.innerText = ""; // 双语：隐藏答案
    }
}

// 核对答案
function checkAnswer() {
    if (!currentDictWord) return alert("请先获取题目");
    const inputVal = document.getElementById('userInput').value.trim();
    const tipDom = document.getElementById('answerTip');
    if (input === currentDictWord.kr || inputVal === currentDictWord.cn) {
        tipDom.innerText = "✅ 回答正确！";
        tipDom.className = "text-xl font-bold text-emerald-500 h-10";
    } else {
        tipDom.innerText = `❌ 正确：${currentDictWord.kr} / ${currentDictWord.cn}`;
        tipDom.className = "text-xl font-bold text-rose-500 h-10";
        if (!errorList.some(item => item.kr === currentDictWord.kr)) {
            errorList.push(currentDictWord);
            localStorage.setItem('krError', JSON.stringify(errorList));
            renderErrorPage();
        }
    }
}

window.onload = function(){
    renderWordList();
    renderCollectPage();
    renderErrorPage();
}
</script>
</body>
